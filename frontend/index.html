<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App - Cloud Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-sticky-note"></i> Cloud Notes App</h1>
            <p class="subtitle">Your notes, anywhere, anytime</p>
            
            <div class="user-section" id="userSection">
                <div id="authButtons">
                    <button class="btn btn-primary" onclick="showLoginModal()">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                    <button class="btn btn-secondary" onclick="showRegisterModal()">
                        <i class="fas fa-user-plus"></i> Register
                    </button>
                </div>
                <div id="userInfo" style="display: none;">
                    <span id="userEmail"></span>
                    <button class="btn btn-danger" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>
        </header>

        <!-- Login Modal -->
        <div id="loginModal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeLoginModal()">&times;</span>
                <h2>Login</h2>
                <form id="loginForm">
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>
                <div id="loginError" class="error-message"></div>
            </div>
        </div>

        <!-- Register Modal -->
        <div id="registerModal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeRegisterModal()">&times;</span>
                <h2>Register</h2>
                <form id="registerForm">
                    <div class="input-group">
                        <label>Name</label>
                        <input type="text" id="registerName" required>
                    </div>
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="registerEmail" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="registerPassword" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Register</button>
                </form>
                <div id="registerError" class="error-message"></div>
            </div>
        </div>

        <!-- Main App (Hidden until login) -->
        <div id="mainApp" style="display: none;">
            <div class="project-card">
                <div class="notes-app-container">
                    <div class="notes-input-section">
                        <h3>Create New Note</h3>
                        
                        <div class="input-group">
                            <label class="input-label" for="noteTitle">Note Title</label>
                            <input type="text" id="noteTitle" placeholder="Enter note title...">
                        </div>
                        
                        <div class="input-group">
                            <label class="input-label" for="noteContent">Note Content</label>
                            <textarea id="noteContent" placeholder="Write your note here..."></textarea>
                        </div>
                        
                        <div class="notes-actions">
                            <button class="action-btn save-btn" id="saveNoteBtn">
                                <i class="fas fa-save"></i> Save Note
                            </button>
                            <button class="action-btn clear-btn" id="clearNoteBtn">
                                <i class="fas fa-redo"></i> Clear
                            </button>
                        </div>
                        
                        <div class="error-message" id="noteError"></div>
                    </div>
                    
                    <div class="notes-list-section">
                        <div class="stats-bar">
                            <div class="stat-item">
                                <div class="stat-value" id="totalNotes">0</div>
                                <div class="stat-label">Total Notes</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value" id="totalChars">0</div>
                                <div class="stat-label">Characters</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value" id="lastUpdated">-</div>
                                <div class="stat-label">Last Updated</div>
                            </div>
                        </div>
                        
                        <h3>Your Notes</h3>
                        
                        <div class="notes-list" id="notesList">
                            <div class="no-notes" id="noNotesMessage">
                                <i class="fas fa-clipboard" style="font-size: 3rem; margin-bottom: 15px; color: #ccc; display: block;"></i>
                                No notes yet. Create your first note!
                            </div>
                        </div>
                        
                        <div class="notes-actions" style="margin-top: 20px;">
                            <button class="action-btn download-btn" id="downloadAllBtn">
                                <i class="fas fa-download"></i> Export All Notes
                            </button>
                            <button class="action-btn delete-all-btn" id="deleteAllBtn">
                                <i class="fas fa-trash"></i> Delete All Notes
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>Cloud Notes App | Data stored securely in PostgreSQL</p>
            <p>Your notes are accessible from anywhere</p>
        </footer>
    </div>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
